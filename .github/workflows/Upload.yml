name: Upload install scripts
on:
  push:

env:
  GH_TOKEN: ${{ secrets.DUCKDBLABS_BOT_TOKEN }}

jobs:
  test-linux:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6

    - name: Test install.sh on Linux
      shell: bash
      run: |
        cat install.sh | bash
        ~/.duckdb/cli/latest/duckdb -c "select 42"

  test-windows:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v6
  
    - name: Test install.ps1 on Windows
      shell: pwsh
      run: |
        ./install.ps1
        $sh = New-Object -ComObject WScript.Shell
        $target = $sh.CreateShortcut("$Home\Desktop\DuckDB.lnk").TargetPath
        & $target -c "select 42"

  upload:
    needs: [test-linux, test-windows]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v6

      - name: Upload
        shell: bash
        run: |
          ls -lah
          echo 'hello upload'
